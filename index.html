<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>FIN DEL DÍA</title>

<style>
:root{
    color-scheme: dark;
}

*{
    margin:0;
    padding:0;
    box-sizing:border-box;
}

body{
    display:flex;
    justify-content:center;
    align-items:center;
    min-height:100vh;
    background:transparent;
    font-family:Inter,-apple-system,BlinkMacSystemFont,"Segoe UI",Roboto,sans-serif;
}

.widget{
    width:340px;
    height:360px;

    background:rgba(28,28,30,.82);

    border-radius:30px;

    border:1px solid rgba(255,255,255,.08);

    backdrop-filter:blur(22px);
    -webkit-backdrop-filter:blur(22px);

    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
}

.title{
    color:white;
    font-size:15px;
    font-weight:700;
    letter-spacing:4px;
    margin-bottom:28px;
    user-select:none;
}

.ring{
    position:relative;
    width:230px;
    height:230px;
}

svg{
    width:230px;
    height:230px;
    transform:rotate(-90deg);
}

.track{
    fill:none;
    stroke:rgba(255,255,255,.10);
    stroke-width:12;
}

.progress{
    fill:none;
    stroke:white;
    stroke-width:12;
    stroke-linecap:round;

    filter:drop-shadow(0 0 6px rgba(255,255,255,.35));

    transition:stroke-dashoffset .8s linear;
}

.time{
    position:absolute;
    inset:0;

    display:flex;
    justify-content:center;
    align-items:center;

    color:white;

    font-size:38px;
    font-weight:800;

    font-variant-numeric:tabular-nums;
    letter-spacing:1px;

    user-select:none;
}
</style>
</head>

<body>

<div class="widget">

    <div class="title">
        FIN DEL DÍA
    </div>

    <div class="ring">

        <svg viewBox="0 0 230 230">

            <circle
                class="track"
                cx="115"
                cy="115"
                r="95"/>

            <circle
                id="progress"
                class="progress"
                cx="115"
                cy="115"
                r="95"/>

        </svg>

        <div id="time" class="time">
            00:00:00
        </div>

    </div>

</div>

<script>

const END_HOUR = 21;
const END_MINUTE = 30;

const radius = 95;
const circumference = 2 * Math.PI * radius;

const progress = document.getElementById("progress");

progress.style.strokeDasharray = circumference;
progress.style.strokeDashoffset = 0;

function pad(value){
    return String(value).padStart(2,"0");
}

function update(){

    const now = new Date();

    let target = new Date(now);
    target.setHours(END_HOUR, END_MINUTE, 0, 0);

    if(now >= target){
        target.setDate(target.getDate() + 1);
    }

    const remaining = target - now;

    const hours = Math.floor(remaining / 3600000);
    const minutes = Math.floor((remaining % 3600000) / 60000);
    const seconds = Math.floor((remaining % 60000) / 1000);

    document.getElementById("time").textContent =
        `${pad(hours)}:${pad(minutes)}:${pad(seconds)}`;

    const start = new Date(target);
    start.setHours(0,0,0,0);

    const total = target - start;
    const elapsed = now - start;

    let percent = elapsed / total;

    percent = Math.max(0, Math.min(1, percent));

    // El anillo comienza lleno y se vacía durante el día
    progress.style.strokeDashoffset = circumference * percent;

}

update();

setInterval(update,1000);

</script>

</body>
</html>
